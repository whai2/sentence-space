services:
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: myeolsal_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - MONGODB_URI=mongodb://mongodb:27017
    volumes:
      - chroma_data:/app/data
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: myeolsal_mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  chroma_data:
  mongodb_data:
